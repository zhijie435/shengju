    <script>
        function normalizeHttpOriginLocal(u) {
            if (u == null || typeof u !== 'string') return u;
            var s = u.trim();
            if (!s) return s;
            if (s.charAt(0) === '/' && s.charAt(1) !== '/') return s.replace(/\/+$/, '') || '/';
            while (/^https?:\/\/https?:\/\//i.test(s)) s = s.replace(/^https?:\/\//i, '');
            s = s.replace(/^(https?:\/\/)\/+/i, '$1');
            return s.replace(/\/+$/, '');
        }
        // 总管理端（考试系统）iframe 地址：
        // 开发时可设置为如 'http://localhost:5178' 指向本地 dev 服务；
        // 部署到服务器供其他电脑访问时，应留空，使用同源 /exam-super-admin 打包资源，
        // 这样所有电脑都会访问服务器的地址，而不是各自机器的 localhost。
        window.EXAM_SUPER_ADMIN_ORIGIN = '';
        // 可选：本机连 Vite 调试时可在控制台设置 localStorage.setItem('EXAM_SUPER_ADMIN_ORIGIN','http://127.0.0.1:5178') 后刷新
        try {
            var _eo = localStorage.getItem('EXAM_SUPER_ADMIN_ORIGIN');
            if (_eo && _eo.trim()) window.EXAM_SUPER_ADMIN_ORIGIN = normalizeHttpOriginLocal(_eo.trim());
        } catch (e) {}

        // 刷新保活：脚本一执行就根据 localStorage / sessionStorage / hash 恢复标签页
        (function(){
            var tab = '';

        // 动态加载脚本函数（支持多个备用路径）
        function loadScript(src, fallbackPaths = []) {
            return new Promise((resolve, reject) => {
                // 检查脚本是否已加载
                const existingScript = document.querySelector(`script[src="${src}"]`);
                if (existingScript) {
                    resolve();
                    return;
                }
                
                const allPaths = [src, ...fallbackPaths];
                let currentIndex = 0;
                
                function tryLoad(path) {
                    const script = document.createElement('script');
                    script.src = path;
                    script.onload = () => {
                        console.log('✓ 脚本加载成功:', path);
                        resolve();
                    };
                    script.onerror = () => {
                        currentIndex++;
                        if (currentIndex < allPaths.length) {
                            console.warn(`尝试备用路径: ${allPaths[currentIndex]}`);
                            tryLoad(allPaths[currentIndex]);
                        } else {
                            console.error('✗ 所有路径都加载失败:', allPaths);
                            reject(new Error(`无法加载脚本: ${allPaths.join(', ')}`));
                        }
                    };
                    document.head.appendChild(script);
                }
                
                tryLoad(allPaths[0]);
            });
        }

        function resolveExamSuperAdminIframeBase() {
            var origin = window.location.origin || ((window.location.protocol || 'http:') + '//' + (window.location.hostname || 'localhost') + (window.location.port ? (':' + window.location.port) : ''));
            origin = normalizeHttpOriginLocal(origin);
            var ex = (window.EXAM_SUPER_ADMIN_ORIGIN && String(window.EXAM_SUPER_ADMIN_ORIGIN).trim()) ? String(window.EXAM_SUPER_ADMIN_ORIGIN).trim() : '';
            if (!ex) return normalizeHttpOriginLocal(origin + getExamSuperAdminBasePath());
            ex = normalizeHttpOriginLocal(ex.replace(/\/$/, ''));
            try {
                var u = new URL(ex.indexOf('://') === -1 ? ('http:' + ex) : ex);
                var cur = new URL(origin);
                var pathOnly = (u.pathname || '').replace(/\/+$/, '');
                var isLocalDev = /^(localhost|127\.0\.0\.1)$/i.test(u.hostname) || u.port === '5178' || u.port === '5175';
                if (!isLocalDev && (!pathOnly || pathOnly === '')) {
                    if (u.hostname === cur.hostname && String(u.port || '') === String(cur.port || '') && u.protocol === cur.protocol) {
                        ex = normalizeHttpOriginLocal(ex + getExamSuperAdminBasePath());

        // 等待 auth 就绪（最多等待约 3 秒，避免无限重试并消除“未加载”警告）
        function waitForAuth(maxWaitMs, intervalMs) {
            maxWaitMs = maxWaitMs || 3000;
            intervalMs = intervalMs || 200;
            return new Promise(function(resolve) {
                if (window.auth) {
                    resolve(true);
                    return;
                }
                var waited = 0;
                var t = setInterval(function() {
                    waited += intervalMs;
                    if (window.auth) {
                        clearInterval(t);
                        resolve(true);
                        return;
                    }
                    if (waited >= maxWaitMs) {
                        clearInterval(t);
                        resolve(false);
                    }
                }, intervalMs);
            });
        }

            if (examId) {
                switchMainTab('examSystem', examId);
                return;
            }

            if (!paperId) {
                alert('未找到试卷ID，无法导入到考试系统');
                return;
            }

            try {
                // 通过后端接口 /api/exams/import-from-paper 基于试卷创建考试
                var apiBase = window.API_BASE || (window.APP_CONFIG && window.APP_CONFIG.apiBase) || '';
                if (!apiBase) {
                    apiBase = (window.location.protocol || 'http:') + '//' +
                        (window.location.hostname || 'localhost') +
                        (window.location.port ? (':' + window.location.port) : '');
                }

                var headers = { 'Content-Type': 'application/json' };

                // 复用题库/系统中的鉴权信息
                var token = null;
                try {
                    if (window.auth && typeof window.auth.getToken === 'function') {
                        token = window.auth.getToken();
                    }
                } catch (e) {
                    console.warn('无法从当前窗口获取token:', e);
                }
                if (!token) {
                    try {
                        token = localStorage.getItem('auth_token');
                    } catch (e) {
                        console.warn('无法从localStorage获取token:', e);
                    }
                }
                if (token) {
                    headers['Authorization'] = 'Bearer ' + token;
                }

                var resp = await fetch(apiBase + '/api/exams/import-from-paper', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ paperId: paperId })
                });

                if (!resp.ok) {
                    var errMsg = '导入失败：' + resp.status + ' ' + resp.statusText;
                    try {
                        var errData = await resp.json();
                        if (errData && errData.message) {
                            errMsg = '导入失败：' + errData.message;
                        }
                    } catch (e) {}
                    alert(errMsg);
                    return;
                }

                var result = await resp.json();
                if (!result || !result.success || !result.data || !result.data.id) {
                    alert(result && result.message ? ('导入失败：' + result.message) : '导入失败：服务器未返回有效考试ID');
                    return;
                }

                var newExamId = result.data.id;
                var newExamName = result.data.name || '新创建的考试';
                alert('试卷已成功导入到考试系统！\n考试名称：' + newExamName + '\n正在跳转到考试系统查看。');

                // 切换到考试系统标签页并传递新考试ID
                switchMainTab('examSystem', newExamId);
            } catch (e) {
                console.error('导入试卷到考试系统失败:', e);
                alert('导入失败：' + (e && e.message ? e.message : '网络或服务器错误'));
            }
        };

        // 根据 URL hash 或页面加载时保存的值恢复当前页（刷新后停留在刷新时的页面）
        function restorePageFromHash() {
            var hash = '';
            if (typeof window.__APP_SAVED_TAB__ !== 'undefined' && window.__APP_SAVED_TAB__ !== '') {
                hash = window.__APP_SAVED_TAB__;
                window.__APP_SAVED_TAB__ = '';
            }
            if (!hash) hash = (location.hash || '').replace(/^#/, '');
            if (!hash) {
                try {
                    var saved = localStorage.getItem('app_last_tab') || sessionStorage.getItem('app_tab');
                    if (saved) {
                        hash = saved;
                        location.hash = hash;
                    }
                } catch (e) {}
            }
            if (!hash) hash = 'editor';
            window._restoringFromHash = true;
            try {
                if (!hash || hash === 'editor' || hash.indexOf('editor') === 0) {
                    var editorPaperId = null;
                    if (hash && hash.indexOf('editor') === 0) {
                        var q = hash.indexOf('?');
                        if (q !== -1) {
                            var rest = hash.slice(q + 1);
                            var parts = rest.split('&');
                            for (var i = 0; i < parts.length; i++) {
                                var kv = parts[i].split('=');
                                if (kv[0] === 'paperId' && kv[1]) {
                                    editorPaperId = decodeURIComponent(kv[1]);
                                    break;
                                }
                            }
                        }
                    }
                    switchMainTab('editor', editorPaperId);
                    try { sessionStorage.setItem('app_tab', 'editor'); } catch (e) {}
                    return;
                }
                if (hash === 'questionBank' || hash === 'questionBank/') {
                    switchMainTab('questionBank');
                    return;
                }
                if (hash.indexOf('questionBank/') === 0) {
                    var sub = hash.replace('questionBank/', '').trim();
                    switchMainTab('questionBank');
                    if (sub === 'papers') {
                        switchQuestionBankTab('papers');
                    } else {
                        switchQuestionBankTab('questions');
                    }
                    return;
                }
                if (hash.indexOf('examSystem') === 0) {
                    var paperId = null;
                    var q = hash.indexOf('?');
                    if (q !== -1) {
                        var params = hash.slice(q + 1).split('&');
                        for (var i = 0; i < params.length; i++) {
                            var kv = params[i].split('=');
                            if (kv[0] === 'paperId' && kv[1]) {
                                paperId = decodeURIComponent(kv[1]);
                                break;
                            }
                        }
                    }
                    switchMainTab('examSystem', paperId);
                    return;
                }
                switchMainTab('editor');
            } finally {
                window._restoringFromHash = false;
                if (hash && location.hash.replace(/^#/, '') !== hash) location.hash = hash;
            }
        }

        // 渲染分页
        function renderPagination(currentPage, totalPages) {
            const container = document.getElementById('paginationContainer');
            
            // 如果没有总页数或总页数为0，清空分页容器
            if (!totalPages || totalPages === 0 || isNaN(totalPages)) {
                container.innerHTML = '';
                return;
            }
            
            totalPages = parseInt(totalPages) || 0;
            if (totalPages <= 0) {
                container.innerHTML = '';
                return;
            }
            
            currentPage = parseInt(currentPage) || 1;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            
            let html = '';
            
            // 如果只有一页，也显示分页信息（但不显示翻页按钮）
            if (totalPages === 1) {
                html += `<span style="color: #666; padding: 10px 20px; display: inline-block;">第 1 页，共 1 页</span>`;
            } else {
                // 多页时显示完整的分页控件
                html += `<button class="btn btn-secondary" ${currentPage <= 1 ? 'disabled' : ''} onclick="loadQuestions(${currentPage - 1})" style="min-width: 80px;">上一页</button>`;
                
                // 显示页码按钮
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                        html += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'}" onclick="loadQuestions(${i})" style="min-width: 40px;">${i}</button>`;
                    } else if (i === currentPage - 3 || i === currentPage + 3) {
                        html += `<span style="padding: 0 5px; color: #666;">...</span>`;
                    }
                }
                
                html += `<button class="btn btn-secondary" ${currentPage >= totalPages ? 'disabled' : ''} onclick="loadQuestions(${currentPage + 1})" style="min-width: 80px;">下一页</button>`;
                html += `<span style="margin-left: 10px; color: #666; padding: 10px 0; display: inline-block;">第 ${currentPage} 页，共 ${totalPages} 页</span>`;
            }
            
            container.innerHTML = html;
        }

        // 全选/取消全选
        window.toggleAllQuestions = function(checkbox) {
            const checkboxes = document.querySelectorAll('#questionListContainer input[type="checkbox"]:not([onchange*="toggleAllQuestions"])');
            checkboxes.forEach(cb => {
                cb.checked = checkbox.checked;
                const match = cb.getAttribute('onchange').match(/toggleSelect\((\d+)\)/);
                if (match) {
                    const id = parseInt(match[1], 10);
                    var has = questionBankState.selectedIds.some(function(sid) { return sid == id || Number(sid) === Number(id); });
                    if (checkbox.checked && !has) {
                        questionBankState.selectedIds.push(id);
                    } else if (!checkbox.checked) {
                        questionBankState.selectedIds = questionBankState.selectedIds.filter(function(sid) { return sid != id && Number(sid) !== Number(id); });
                    }
                }
            });
            updateBatchDeleteButton();
        };
        
        // 切换选择（按值相等比较，避免第二页等 id 类型不一致）
        window.toggleSelect = function(id) {
            var arr = questionBankState.selectedIds;
            var index = arr.findIndex(function(sid) { return sid == id || Number(sid) === Number(id); });
            if (index > -1) {
                arr.splice(index, 1);

                arr.push(id);

        // 批量删除（按 category+subject 分组，与数据库表一一对应，确保正确删除）
        window.batchDelete = async function() {
            if (questionBankState.selectedIds.length === 0) {
                showQuestionBankMessage('请选择要删除的题目', 'error');
                return;
            }
            if (!confirm('确定要删除选中的 ' + questionBankState.selectedIds.length + ' 道题目吗？')) {
                return;
            }
            try {
                var list = questionBankState.currentQuestions || [];
                var idSet = questionBankState.selectedIds.slice();
                var selected = list.filter(function(q) {
                    if (q == null || (q.id !== 0 && !q.id)) return false;
                    return idSet.some(function(sid) { return sid == q.id || Number(sid) === Number(q.id); });
                });
                if (selected.length === 0) {
                    showQuestionBankMessage('未找到选中题目数据，请刷新列表后重试', 'error');
                    return;
                }
                var byTable = {};
                selected.forEach(function(q) {
                    var cat = String(q.category || q.Category || '未分类').trim() || '未分类';
                    var sub = String(q.subject || q.Subject || '未分类').trim() || '未分类';
                    var key = cat + '\0' + sub;
                    if (!byTable[key]) byTable[key] = { category: cat, subject: sub, ids: [] };
                    byTable[key].ids.push(q.id);
                });
                var API_BASE = getQuestionBankApiBase();
                var totalDeleted = 0;
                for (var key in byTable) {
                    var g = byTable[key];
                    var response = await questionBankAuthFetch(API_BASE + '/api/question-bank/batch', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ids: g.ids, category: g.category, subject: g.subject })
                    });
                    var result = await response.json();
                    if (result.success) totalDeleted += g.ids.length;
                    else {
                        showQuestionBankMessage('删除失败：' + (result.message || '未知错误'), 'error');
                        return;
                    }
                }
                showQuestionBankMessage('成功删除 ' + totalDeleted + ' 道题目', 'success');
                questionBankState.selectedIds = [];
                loadQuestions(questionBankState.currentPage);
            } catch (error) {
                console.error('批量删除失败:', error);
                showQuestionBankMessage('删除失败：' + error.message, 'error');
            }
        };

            if (!confirm('确定要删除这道题目吗？')) return;
            var list = questionBankState.currentQuestions || [];
            var q = list.find(function(x) { return x != null && (x.id === id || x.id == id || Number(x.id) === Number(id)); });

            var subject = q ? (String(q.subject || q.Subject || '').trim()) : '';
            try {
                var API_BASE = getQuestionBankApiBase();
                var url = API_BASE + '/api/question-bank/' + encodeURIComponent(id);
                var response = await questionBankAuthFetch(url, { method: 'DELETE' });
                var result;
                try {
                    result = await response.json();
                } catch (e) {
                    result = { success: false, message: response.status === 401 ? '请重新登录' : ('HTTP ' + response.status) };

                if (response.ok && result.success) {
                    showQuestionBankMessage('删除成功', 'success');

                showQuestionBankMessage('删除失败：' + error.message, 'error');
            }
        };

        function escapeHtml(str) {

            const s = String(str);
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

                for (let i = 0; i < questionTypeSelect.options.length; i++) {
                    if (questionTypeSelect.options[i].value === newType.trim()) {

        // 加载试卷列表
        window.loadPapers = async function(page = 1) {
            paperState.currentPage = page;
            
            const paperName = document.getElementById('filterPaperName').value;
            const projectName = document.getElementById('filterProjectName').value;
            
            const params = new URLSearchParams({
                page: page,
                pageSize: paperState.pageSize
            });
            
            if (paperName) params.append('paperName', paperName);
            if (projectName) params.append('projectName', projectName);
            
            try {
                const API_BASE = getQuestionBankApiBase();
                const response = await examPaperApiFetch(`${API_BASE}/api/exam-papers?${params}`);
                const result = await response.json();
                
                if (result.success) {
                    paperState.total = result.data.total || result.data.papers.length;
                    document.getElementById('paperTotalCount').textContent = result.data.total || result.data.papers.length;
                    renderPapers(result.data.papers || result.data);
                    if (result.data.totalPages) {
                        renderPaperPagination(result.data.page, result.data.totalPages);
                    }
                } else {
                    showQuestionBankMessage('加载失败：' + result.message, 'error');
                }
            } catch (error) {
                console.error('加载试卷失败:', error);
                showQuestionBankMessage('加载失败：' + error.message, 'error');
            }
        };

        // 从 preview_html 中移除首页和注意事项页，仅保留试题正文
        function stripCoverAndNotesPages(html) {
            if (!html || typeof html !== 'string') return html || '';
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const wrapper = doc.querySelector('.a4-pages-wrapper');
            if (!wrapper) return html;
            const pages = wrapper.querySelectorAll('.a4-page, .a3-page, .cover-page, .notes-page');
            const kept = [];
            for (let i = 0; i < pages.length; i++) {
                const p = pages[i];
                if (p.classList.contains('cover-page') || p.classList.contains('notes-page')) continue;
                kept.push(p.outerHTML);
            }
            return '<div class="a4-pages-wrapper">' + kept.join('') + '</div>';
        }
        
        // 根据试卷 paper（含 majorQuestions[].subQuestions）生成「小题答案与解析」区块 HTML
        function buildPaperSubQuestionsAnswersHtml(paper) {
            if (!paper.majorQuestions || paper.majorQuestions.length === 0) return '';
            let globalIndex = 0;
            let html = '<div class="paper-sub-answers-section" style="margin-top: 24px; padding-top: 20px; border-top: 2px solid #e0e0e0;">' +
                '<h4 style="margin: 0 0 16px 0; color: #2c3e50; font-size: 16px;">小题答案与解析</h4>';
            for (let mi = 0; mi < paper.majorQuestions.length; mi++) {
                const major = paper.majorQuestions[mi];
                const subs = major.subQuestions || [];
                for (let si = 0; si < subs.length; si++) {
                    const sub = subs[si];
                    globalIndex++;
                    const majorNum = major.major_number != null ? major.major_number : (mi + 1);
                    const subNum = sub.number != null ? sub.number : (si + 1);
                    const label = '第 ' + globalIndex + ' 题（第 ' + majorNum + ' 大题 第 ' + subNum + ' 小题）';
                    const rawBody = (sub.content_text || '').trim() || (sub.content_html ? String(sub.content_html).replace(/<[^>]+>/g, '').trim() : '');
                    const summary = rawBody.length > 80 ? rawBody.substring(0, 80) + '…' : rawBody;
                    let answerDisplay = (sub.answer_html != null && String(sub.answer_html).trim() && String(sub.answer_html).trim() !== 'null') ? sub.answer_html :
                        ((sub.answer != null && String(sub.answer).trim()) ? escapeHtml(String(sub.answer).trim()) : '');
                    if (!answerDisplay) answerDisplay = '<span style="color: #999; font-style: italic;">暂无答案</span>';
                    let explanationDisplay = (sub.explanation_html != null && String(sub.explanation_html).trim() && String(sub.explanation_html).trim() !== 'null') ? sub.explanation_html :
                        ((sub.explanation != null && String(sub.explanation).trim()) ? escapeHtml(String(sub.explanation).trim()) :
                            ((sub.answer_analysis != null && String(sub.answer_analysis).trim()) ? escapeHtml(String(sub.answer_analysis).trim()) : ''));
                    if (!explanationDisplay) explanationDisplay = '<span style="color: #999; font-style: italic;">暂无解析</span>';
                    html += '<div style="margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-radius: 6px; border: 1px solid #e0e0e0;">' +
                        '<div style="font-weight: 600; margin-bottom: 8px; color: #2c3e50;">' + escapeHtml(label) + '</div>' +
                        (summary ? '<div style="font-size: 13px; color: #666; margin-bottom: 8px;">' + escapeHtml(summary) + '</div>' : '') +
                        '<div style="margin-top: 8px; padding: 10px; background: #fff9e6; border-radius: 4px; border: 1px solid #ffd700;"><strong>答案：</strong><div style="margin-top: 4px; line-height: 1.6;">' + answerDisplay + '</div></div>' +
                        '<div style="margin-top: 8px; padding: 10px; background: #e8f5e9; border-radius: 4px; border: 1px solid #4caf50;"><strong>解析：</strong><div style="margin-top: 4px; line-height: 1.6;">' + explanationDisplay + '</div></div>' +
                        '</div>';
                }
            }
            html += '</div>';
            return html;
        }

                                        <p><strong>总分：</strong>${paper.total_score || 0}分</p>

                        content.innerHTML = `

                    }
                    
                    modal.classList.add('active');
                } else {
                    showQuestionBankMessage('加载失败：' + result.message, 'error');
                }
            } catch (error) {
                console.error('加载试卷详情失败:', error);
                showQuestionBankMessage('加载失败：' + error.message, 'error');
            }
        };
        
        // 删除试卷
        window.deletePaper = async function(id) {
            if (!confirm('确定要删除这套试卷吗？')) {
                return;
            }
            
            try {
                const API_BASE = getQuestionBankApiBase();
                const response = await questionBankAuthFetch(`${API_BASE}/api/exam-papers/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showQuestionBankMessage('删除成功', 'success');
                    loadPapers(paperState.currentPage);
                } else {
                    showQuestionBankMessage('删除失败：' + result.message, 'error');
                }
            } catch (error) {
                console.error('删除失败:', error);
                showQuestionBankMessage('删除失败：' + error.message, 'error');
            }
        };
        
        // 渲染试卷分页
        function renderPaperPagination(currentPage, totalPages) {
            const container = document.getElementById('paperPaginationContainer');
            let html = '';
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            html += `<button class="btn btn-secondary" ${currentPage <= 1 ? 'disabled' : ''} onclick="loadPapers(${currentPage - 1})">上一页</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'}" onclick="loadPapers(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            
            html += `<button class="btn btn-secondary" ${currentPage >= totalPages ? 'disabled' : ''} onclick="loadPapers(${currentPage + 1})">下一页</button>`;
            
            container.innerHTML = html;
        }
    </script>
</body>
