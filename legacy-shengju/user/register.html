<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人注册 - 圣举人才网</title>
    <link rel="stylesheet" href="/static/css/tailwind-local.css">
  <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="../js/api-config.js"></script>
    <script src="../js/auth-helper.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#3B82F6' } } } };
    </script>
</head>
<body class="font-sans bg-gray-50 min-h-screen flex flex-col">
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="../index.html" class="flex items-center space-x-2" title="返回网站首页">
                <span class="text-xl font-bold text-primary">圣举人才网</span>
            </a>
            <div class="flex items-center gap-3 text-sm">
                <a href="login.html" id="login-from-register" class="text-gray-600 hover:text-primary">已有账号，去登录</a>
                <a href="../index.html" class="text-gray-600 hover:text-primary" title="返回网站首页">网站首页</a>
            </div>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="bg-white rounded-xl shadow-lg max-w-md w-full p-8">
            <h1 class="text-2xl font-bold text-primary mb-2">个人注册</h1>
            <p class="text-gray-600 text-sm mb-6">注册个人账号后可报名岗位、使用测评与简历服务</p>
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="regUsername" required placeholder="用于展示的昵称"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                    <input type="email" id="regEmail" required placeholder="用于登录与找回密码"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                    <input type="tel" id="regPhone" required maxlength="11" inputmode="numeric" placeholder="用于登录与短信验证"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">短信验证码</label>
                    <div class="flex gap-2">
                        <input type="text" id="regSmsCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="先点获取验证码"
                            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <button type="button" id="regSendSmsBtn" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 whitespace-nowrap text-sm">获取验证码</button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">短信正文前的「【某某】」为阿里云已审核的<strong>短信签名</strong>，由服务器环境变量 <code class="text-gray-600">ALIYUN_SMS_SIGN_NAME</code> 配置，<strong>无需在本页填写</strong>。与登录共用发码接口 <code class="text-gray-600">/auth/send-sms</code>；模板变量名一般为 <code class="text-gray-600">code</code>。若提示频控，请约 1 小时后再试、换号测试，或联系管理员在阿里云提额；注册成功后可用<strong>用户名或邮箱 + 密码</strong>登录，不必依赖短信。</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="regPassword" required minlength="6" maxlength="20" placeholder="6–20 位"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                    <input type="password" id="regPassword2" required minlength="6" maxlength="20" placeholder="再次输入密码"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div id="registerError" class="hidden text-sm text-red-600"></div>
                <button type="submit" id="registerBtn" class="w-full bg-primary hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition">
                    注册
                </button>
            </form>
        </div>
    </main>
    <script>
        (function() {
            const API_BASE_URL = (typeof window !== 'undefined' && window.API_BASE_URL) ? window.API_BASE_URL : (window.location.origin && (window.location.origin.indexOf('http') === 0) ? window.location.origin + '/api/v1' : 'http://127.0.0.1:3001/api/v1');

            function getSafePostAuthTarget() {
                try {
                    var params = new URLSearchParams(window.location.search);
                    var raw = params.get('return') || params.get('redirect');
                    if (!raw) return null;
                    var dec = decodeURIComponent(raw);
                    if (dec.indexOf('://') >= 0 || dec.indexOf('//') === 0 || dec.indexOf('javascript:') === 0) return null;
                    if (!/^[\w\-\.\/?&=%]+$/.test(dec)) return null;
                    return dec;
                } catch (e) { return null; }
            }

            (function syncLoginLink() {
                var a = document.getElementById('login-from-register');
                if (!a) return;
                var r = getSafePostAuthTarget();
                a.href = r ? ('login.html?redirect=' + encodeURIComponent(r)) : 'login.html';
            })();

            function showError(msg) {
                var el = document.getElementById('registerError');
                if (el) { el.textContent = msg || ''; el.classList.toggle('hidden', !msg); }
            }

            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                showError('');
                var username = document.getElementById('regUsername').value.trim();
                var email = document.getElementById('regEmail').value.trim();
                var phone = document.getElementById('regPhone').value.trim();
                var smsCode = (document.getElementById('regSmsCode') && document.getElementById('regSmsCode').value || '').trim();
                var password = document.getElementById('regPassword').value;
                var password2 = document.getElementById('regPassword2').value;
                if (password !== password2) {
                    showError('两次输入的密码不一致');
                    return;
                }
                if (password.length < 6 || password.length > 20) {
                    showError('密码长度应为 6–20 位');
                    return;
                }
                var phoneDigits = phone.replace(/\D/g, '');
                if (phoneDigits.length < 10) {
                    showError('请填写有效手机号');
                    return;
                }
                var btn = document.getElementById('registerBtn');
                btn.disabled = true;
                btn.textContent = '注册中...';
                try {
                    var res = await fetch(API_BASE_URL + '/auth/register-self', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            phone: phone,
                            password: password,
                            userType: 'jobseeker',
                            smsCode: smsCode || undefined
                        })
                    });
                    var data = await res.json().catch(function() { return {}; });
                    if (res.ok && data.success && data.data) {
                        var d = data.data;
                        var token = d.accessToken || d.token;
                        if (typeof AuthHelper !== 'undefined') {
                            AuthHelper.set('jobseeker', {
                                token: token,
                                userId: d.userId || '',
                                username: d.username || username,
                                userType: 'jobseeker',
                                email: d.email || email
                            });
                        } else {
                            localStorage.setItem('authToken', token);
                            localStorage.setItem('userId', d.userId || '');
                            localStorage.setItem('username', d.username || username);
                            localStorage.setItem('userType', 'jobseeker');
                            localStorage.setItem('email', d.email || email);
                        }
                        var next = getSafePostAuthTarget();
                        window.location.href = next || 'index.html';
                        return;
                    }
                    showError((data && data.message) ? data.message : ('注册失败' + (res.status ? '（' + res.status + '）' : '')));
                } catch (err) {
                    showError(err.message || '网络错误，请稍后重试');
                }
                btn.disabled = false;
                btn.textContent = '注册';
            });

            if (typeof AuthHelper !== 'undefined' && AuthHelper.get('jobseeker') && AuthHelper.get('jobseeker').token) {
                var n = getSafePostAuthTarget();
                window.location.href = n || 'index.html';
            }

            var regSmsTimer = null;
            document.getElementById('regSendSmsBtn').addEventListener('click', async function () {
                var phoneDigits = (document.getElementById('regPhone').value || '').replace(/\D/g, '');
                var btn = document.getElementById('regSendSmsBtn');
                if (phoneDigits.length < 11) {
                    showError('请先填写正确手机号');
                    return;
                }
                showError('');
                btn.disabled = true;
                btn.textContent = '发送中...';
                try {
                    var res = await fetch(API_BASE_URL + '/auth/send-sms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phoneDigits, purpose: 'register' })
                    });
                    var data = await res.json().catch(function () { return {}; });
                    if (!res.ok || !data.success) {
                        showError((data && data.message) ? data.message : '发送失败');
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                        return;
                    }
                    var sec = 60;
                    if (regSmsTimer) clearInterval(regSmsTimer);
                    regSmsTimer = setInterval(function () {
                        sec--;
                        btn.textContent = sec + '秒后重试';
                        if (sec <= 0) {
                            clearInterval(regSmsTimer);
                            regSmsTimer = null;
                            btn.disabled = false;
                            btn.textContent = '获取验证码';
                        }
                    }, 1000);
                } catch (e) {
                    showError(e.message || '网络错误');
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            });
        })();
    </script>
</body>
</html>
