    <script>
    (function() {
        var urlParams = new URLSearchParams(window.location.search);
        var viewMode = urlParams.get('view');
        var reportType = urlParams.get('type');
        var reportId = urlParams.get('id');

        var SYSTEM_TYPES = {
            stress: { name: '专业抗压能力测试', key: 'stress' },
            personality: { name: '性格测试', key: 'personality' },
            intelligence: { name: '智力测试', key: 'intelligence' },
            ability: { name: '职业能力测试', key: 'ability' },
            interest: { name: '兴趣测试', key: 'interest' }
        };

        var questions = [];
        var currentType = '';
        var currentQuestionIndex = 0;
        var userAnswers = {};
        var timer = null;
        var seconds = 0;
        var currentRecordId = null;

        var QUESTIONS_PER_ASSESSMENT = 15;

        function getQuestions() {
            if (typeof STRESS_QUESTIONS === 'undefined') return [];
            if (currentType === 'stress') return STRESS_QUESTIONS;
            if (currentType === 'personality') return PERSONALITY_QUESTIONS;
            if (currentType === 'intelligence') return INTELLIGENCE_QUESTIONS;
            if (currentType === 'ability') return typeof ABILITY_QUESTIONS !== 'undefined' ? ABILITY_QUESTIONS : [];
            if (currentType === 'interest') return typeof INTEREST_QUESTIONS !== 'undefined' ? INTEREST_QUESTIONS : [];
            return [];
        }

        function pickRandomQuestions(all, count) {
            if (!Array.isArray(all) || !all.length) return [];
            var arr = all.slice();
            var n = Math.min(count, arr.length);
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = arr[i];
                arr[i] = arr[j];
                arr[j] = tmp;
            }
            return arr.slice(0, n);
        }

        function getIntroHtml() {
            if (currentType === 'stress') {
                return '<p class="text-gray-600 mb-4">本测评从情绪调节、工作负荷承受、挫折恢复、时间压力与人际压力等维度评估您的抗压能力，题库约 200 题，每次随机抽取 15 题，请根据最近半年的实际感受选择。</p><p class="text-gray-600">预计用时约 10–15 分钟。完成后将生成抗压能力专业报告。</p>';
            }
            if (currentType === 'personality') {
                return '<p class="text-gray-600 mb-4">基于 MBTI 四维度（外向-内向、感觉-直觉、思考-情感、判断-知觉）的职业性格测评，题库约 200 题，每次随机抽取 15 题。</p><p class="text-gray-600">请根据真实情况和第一反应选择，预计 10–15 分钟。完成后将得到您的性格类型与职业建议。</p>';
            }
            if (currentType === 'intelligence') {
                return '<p class="text-gray-600 mb-4">本测评涵盖逻辑推理、数字运算与语言理解，题库约 200 题，每次随机抽取 15 题，用于系统了解您的认知能力。</p><p class="text-gray-600">请独立完成、一次性作答，预计 10–15 分钟。完成后将生成智力测评报告。</p>';
            }
            if (currentType === 'ability') {
                return '<p class="text-gray-600 mb-4">本测评从沟通协作、团队合作、领导力、执行与落实、学习与适应等维度评估您的职业能力，题库约 200 题，每次随机抽取 15 题。</p><p class="text-gray-600">请根据实际工作表现选择，预计 10–15 分钟。完成后将生成职业能力测评报告。</p>';
            }
            if (currentType === 'interest') {
                return '<p class="text-gray-600 mb-4">基于霍兰德职业兴趣类型（实际型、研究型、艺术型、社会型、企业型、常规型），题库约 200 题，每次随机抽取 15 题，探索您的兴趣倾向。</p><p class="text-gray-600">请根据真实偏好选择，预计 10–15 分钟。完成后将生成兴趣测评报告及适合职业方向。</p>';
            }
            return '';
        }

        function initPage() {
            if (viewMode === 'report' && reportType && reportId) {
                showReportView(reportType, reportId);
                return;
            }
            currentType = urlParams.get('type') || 'stress';
            if (!SYSTEM_TYPES[currentType]) currentType = 'stress';
            if (currentType === 'ability' && typeof ABILITY_QUESTIONS === 'undefined') currentType = 'stress';
            if (currentType === 'interest' && typeof INTEREST_QUESTIONS === 'undefined') currentType = 'stress';
            var meta = SYSTEM_TYPES[currentType];
            document.getElementById('page-title').textContent = meta.name;
            document.getElementById('page-subtitle').textContent = '完成测评后即可生成专业测试报告';
            document.getElementById('intro-content').innerHTML = getIntroHtml();
            document.title = meta.name + ' - 圣举人才网';
            var allQuestions = getQuestions();
            if (!allQuestions.length) {
                document.getElementById('intro-content').innerHTML += '<p class="text-red-500 mt-4">题目数据未加载，请刷新页面或检查网络。</p>';
                return;
            }
            questions = pickRandomQuestions(allQuestions, QUESTIONS_PER_ASSESSMENT);
        }

        function showReportView(type, id) {
            document.getElementById('assessment-intro').classList.add('hidden');
            document.getElementById('assessment-questions').classList.add('hidden');
            document.getElementById('assessment-result').classList.add('hidden');
            document.getElementById('progress-block').classList.add('hidden');
            var list = JSON.parse(localStorage.getItem('systemAssessmentRecords') || '[]');
            var record = list.find(function(r) { return String(r.id) === String(id) && r.systemType === type; });
            if (!record) {
                document.getElementById('report-section').classList.remove('hidden');
                document.getElementById('report-content').innerHTML = '<p class="text-gray-600">未找到该测评记录。</p><a href="assessment.html" class="text-primary">返回测评中心</a>';
                return;
            }
            currentType = type;
            renderReportHtml(record);
            document.getElementById('report-section').classList.remove('hidden');
            document.getElementById('report-title').textContent = (SYSTEM_TYPES[type] && SYSTEM_TYPES[type].name) ? SYSTEM_TYPES[type].name + ' - 测评报告' : '测评报告';
            document.getElementById('report-meta').textContent = '完成时间：' + (record.completedDate || record.date || '');
        }

        document.getElementById('menu-toggle').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        document.getElementById('start-assessment').addEventListener('click', function() {
            document.getElementById('assessment-intro').classList.add('hidden');
            document.getElementById('progress-block').classList.remove('hidden');
            document.getElementById('assessment-questions').classList.remove('hidden');
            currentQuestionIndex = 0;
            userAnswers = {};
            loadQuestion(0);
            updateProgress();
            seconds = 0;
            if (timer) clearInterval(timer);
            timer = setInterval(function() {
                seconds++;
                var m = Math.floor(seconds / 60);
                var s = seconds % 60;
                document.getElementById('question-timer').textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
            }, 1000);
        });

        document.getElementById('prev-question').addEventListener('click', function() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion(currentQuestionIndex);
                updateProgress();
            }
        });

        document.getElementById('next-question').addEventListener('click', function() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion(currentQuestionIndex);
                updateProgress();
            } else {
                finishAssessment();
            }
        });

        function loadQuestion(index) {
            var q = questions[index];
            document.getElementById('question-number').textContent = '第 ' + (index + 1) + ' 题';
            document.getElementById('question-text').textContent = q.text;
            var container = document.getElementById('options-container');
            container.innerHTML = '';
            var self = this;
            q.options.forEach(function(opt) {
                var card = document.createElement('div');
                card.className = 'option-card' + (userAnswers[q.id] === opt.value ? ' selected' : '');
                card.dataset.value = opt.value;
                card.innerHTML = '<div class="flex items-center"><div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center mr-3"><div class="w-3 h-3 rounded-full bg-primary ' + (userAnswers[q.id] === opt.value ? '' : 'hidden') + '"></div></div><span>' + opt.text + '</span></div>';
                card.addEventListener('click', function() {
                    document.querySelectorAll('#options-container .option-card').forEach(function(c) {
                        c.classList.remove('selected');
                        var dot = c.querySelector('.w-3');
                        if (dot) dot.classList.add('hidden');
                    });
                    this.classList.add('selected');
                    var d = this.querySelector('.w-3');
                    if (d) d.classList.remove('hidden');
                    userAnswers[q.id] = opt.value;
                    document.getElementById('next-question').disabled = false;
                });
                container.appendChild(card);
            });
            document.getElementById('prev-question').disabled = index === 0;
            document.getElementById('next-question').disabled = !userAnswers[q.id];
            document.getElementById('next-question').textContent = index === questions.length - 1 ? '完成测评' : '下一题';
        }

        function updateProgress() {
            var pct = questions.length ? ((currentQuestionIndex + 1) / questions.length) * 100 : 0;
            document.getElementById('progress-value').style.width = pct + '%';
            document.getElementById('progress-text').textContent = (currentQuestionIndex + 1) + '/' + questions.length;
        }

        function calculateResult() {
            if (currentType === 'stress') {
                var dims = { emotion: [], workload: [], recovery: [], time: [], social: [] };
                var dimNames = { emotion: '情绪调节', workload: '工作负荷', recovery: '挫折恢复', time: '时间压力', social: '人际压力' };
                questions.forEach(function(q) {
                    var d = q.dimension;
                    var v = userAnswers[q.id];
                    if (d && dims[d] !== undefined && v !== undefined) dims[d].push(Number(v) || 0);
                });
                var scores = {};
                var total = 0;
                var count = 0;
                Object.keys(dims).forEach(function(k) {
                    var arr = dims[k];
                    var sum = arr.length ? arr.reduce(function(a,b){ return a+b; }, 0) : 0;
                    var avg = arr.length ? (sum / arr.length) : 0;
                    scores[k] = { name: dimNames[k], score: Math.round(avg * 10) / 10, max: 5 };
                    total += sum;
                    count += arr.length;
                });
                var avgTotal = count ? total / count : 0;
                var level = avgTotal >= 4 ? '高' : avgTotal >= 3 ? '中等' : '待提升';
                return { type: 'stress', dimensions: scores, totalScore: Math.round(avgTotal * 100) / 100, level: level, suggestions: [
                    '保持规律作息与适度运动，有助于稳定情绪。',
                    '将大任务拆解为小步骤，减少 overwhelm。',
                    '遇到挫折时先接纳情绪，再聚焦下一步行动。',
                    '重要事项预留缓冲时间，减少时间压力。',
                    '练习在冲突中表达边界与需求，减少人际压力。'
                ] };
            }
            if (currentType === 'personality') {
                var counts = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
                for (var k in userAnswers) counts[userAnswers[k]] = (counts[userAnswers[k]] || 0) + 1;
                var typeStr = (counts.E >= counts.I ? 'E' : 'I') + (counts.S >= counts.N ? 'S' : 'N') + (counts.T >= counts.F ? 'T' : 'F') + (counts.J >= counts.P ? 'J' : 'P');
                var personalityTypes = window.PERSONALITY_TYPES || {};
                var res = personalityTypes[typeStr] || {
                    title: typeStr + ' 型',
                    description: '您的性格类型为 ' + typeStr + '。建议结合职业兴趣进一步探索适合的方向。',
                    energy: { type: (counts.E >= counts.I ? '外向 (E)' : '内向 (I)'), value: 60 },
                    info: { type: (counts.S >= counts.N ? '感觉 (S)' : '直觉 (N)'), value: 60 },
                    decision: { type: (counts.T >= counts.F ? '思考 (T)' : '情感 (F)'), value: 60 },
                    lifestyle: { type: (counts.J >= counts.P ? '判断 (J)' : '知觉 (P)'), value: 60 },
                    jobs: ['根据性格类型可匹配多种职业'],
                    advice: ['发挥自身偏好，在适合的环境中发展', '适当补足相对较弱的维度']
                };
                return { type: 'personality', mbti: typeStr, personality: res };
            }
            if (currentType === 'intelligence') {
                var logical = 0, number = 0, verbal = 0;
                questions.forEach(function(q) {
                    var correct = q.correct;
                    var u = userAnswers[q.id];
                    if (correct === undefined || u === undefined) return;
                    if (u === correct) {
                        if (q.dimension === 'logical') logical++;
                        else if (q.dimension === 'number') number++;
                        else if (q.dimension === 'verbal') verbal++;
                    }
                });
                var totalRight = logical + number + verbal;
                var totalQ = questions.length;
                var score = totalQ ? Math.round((totalRight / totalQ) * 100) : 0;
                var level = score >= 80 ? '优秀' : score >= 60 ? '良好' : score >= 40 ? '中等' : '待提升';
                return {
                    type: 'intelligence',
                    dimensions: [
                        { name: '逻辑推理', score: logical, max: questions.filter(function(q){ return q.dimension==='logical'; }).length || 1 },
                        { name: '数字运算', score: number, max: questions.filter(function(q){ return q.dimension==='number'; }).length || 1 },
                        { name: '语言理解', score: verbal, max: questions.filter(function(q){ return q.dimension==='verbal'; }).length || 1 }
                    ],
                    totalScore: score,
                    totalRight: totalRight,
                    totalQuestions: totalQ,
                    level: level
                };
            }
            if (currentType === 'ability') {
                var dims = { communication: [], teamwork: [], leadership: [], execution: [], learning: [] };
                var dimNames = { communication: '沟通协作', teamwork: '团队合作', leadership: '领导力', execution: '执行与落实', learning: '学习与适应' };
                questions.forEach(function(q) {
                    var d = q.dimension;
                    var v = userAnswers[q.id];
                    if (d && dims[d] !== undefined && v !== undefined) dims[d].push(Number(v) || 0);
                });
                var scores = {};
                var total = 0, count = 0;
                Object.keys(dims).forEach(function(k) {
                    var arr = dims[k];
                    var sum = arr.length ? arr.reduce(function(a,b){ return a+b; }, 0) : 0;
                    var avg = arr.length ? (sum / arr.length) : 0;
                    scores[k] = { name: dimNames[k], score: Math.round(avg * 10) / 10, max: 5 };
                    total += sum; count += arr.length;
                });
                var avgTotal = count ? total / count : 0;
                var level = avgTotal >= 4 ? '高' : avgTotal >= 3 ? '中等' : '待提升';
                return { type: 'ability', dimensions: scores, totalScore: Math.round(avgTotal * 100) / 100, level: level, suggestions: [
                    '加强书面与口头表达练习，提升沟通效率。',
                    '多参与跨部门或跨团队项目，锻炼协作与领导力。',
                    '设定小目标并按时完成，强化执行与落实习惯。',
                    '定期学习新技能，保持学习与适应能力。'
                ] };
            }
            if (currentType === 'interest') {
                var counts = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
                for (var k in userAnswers) { var v = userAnswers[k]; if (counts[v] !== undefined) counts[v] = (counts[v] || 0) + 1; }
                var codes = ['R','I','A','S','E','C'];
                var sorted = codes.slice().sort(function(a,b){ return (counts[b] || 0) - (counts[a] || 0); });
                var dominant = sorted[0] || 'R';
                var secondary = sorted[1] || 'I';
                var interestTypes = window.INTEREST_TYPES || {};
                var res = interestTypes[dominant] || { name: '实际型', description: '您倾向于动手与操作类活动，适合技术、机械、户外等相关职业。', jobs: ['技术员','工程师','驾驶员','技工'], advice: ['发挥动手与实操优势','可考取相关技能证书'] };
                return { type: 'interest', dominant: dominant, secondary: secondary, counts: counts, interest: res };
            }
            return {};
        }

        function finishAssessment() {
            if (timer) clearInterval(timer);
            document.getElementById('assessment-questions').classList.add('hidden');
            document.getElementById('progress-block').classList.add('hidden');
            document.getElementById('assessment-result').classList.remove('hidden');
            var result = calculateResult();
            displayResult(result);
            var meta = SYSTEM_TYPES[currentType];
            var record = {
                id: 'sys_' + currentType + '_' + Date.now(),
                systemType: currentType,
                packageName: meta.name,
                packageId: currentType,
                completedDate: new Date().toISOString().split('T')[0],
                date: new Date().toISOString(),
                result: result.type === 'personality' ? result.mbti : result.type === 'interest' ? result.dominant : (result.level || result.totalScore),
                score: result.totalScore !== undefined ? result.totalScore : (result.type === 'personality' ? 0 : null),
                raw: result,
                duration: seconds
            };
            currentRecordId = record.id;
            var list = JSON.parse(localStorage.getItem('systemAssessmentRecords') || '[]');
            list.unshift(record);
            localStorage.setItem('systemAssessmentRecords', JSON.stringify(list));
            var userRecords = JSON.parse(localStorage.getItem('userAssessmentRecords') || '[]');
            userRecords.unshift({ id: record.id, packageId: record.packageId, packageName: record.packageName, completedDate: record.completedDate, result: record.result, score: record.score, systemType: currentType });
            localStorage.setItem('userAssessmentRecords', JSON.stringify(userRecords));
            // 已登录时同步提交到后端，便于「我的测评记录」跨设备展示
            (function() {
                var token = (typeof AuthHelper !== 'undefined' && AuthHelper.get && AuthHelper.get('jobseeker')) ? (AuthHelper.get('jobseeker').token || '') : (localStorage.getItem('authToken') || sessionStorage.getItem('authToken') || '');
                if (!token || !currentType) return;
                var apiBase = getApiBase();
                var payload = { result: record.raw || {}, packageName: record.packageName || meta.name, duration: seconds };
                if (typeof payload.result === 'object' && !payload.result.title && record.result) payload.result.title = record.result;
                var xhr = new XMLHttpRequest();
                xhr.open('POST', apiBase + '/assessments/' + encodeURIComponent(currentType) + '/submit');
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.setRequestHeader('Authorization', 'Bearer ' + token);
                xhr.onload = function() { if (xhr.status >= 200 && xhr.status < 300 && window.showToast) window.showToast('测评已提交并保存', 'success'); };
                xhr.onerror = function() { console.warn('提交测评到服务器失败'); };
                try { xhr.send(JSON.stringify(payload)); } catch (e) { console.warn('提交测评失败', e); }
            })();
        }

            if (typeof window !== 'undefined' && window.API_BASE_URL) return window.API_BASE_URL;

                if (u) return u.replace(/\/$/, '');

        }

        function scoreJobByAssessment(job, record) {
            var r = record.raw || {};
            var score = 0;
            var reasons = [];
            if (record.systemType === 'personality' && r.personality && r.personality.jobs) {
                var jobName = (job.name || '').toLowerCase();
                var jobType = (job.jobType || '') + (job.industry || '');
                r.personality.jobs.forEach(function(recJob) {
                    if (jobName.indexOf(recJob.toLowerCase()) !== -1 || jobType.indexOf(recJob) !== -1) {
                        score += 35;
                        reasons.push('与测评推荐职业方向一致');
                    }
                });
                var typeMap = { '技术类': ['工程师','开发','技术'], '产品类': ['产品','经理'], '运营类': ['运营'], '设计类': ['设计','UI'], '市场类': ['市场','营销'], '教育类': ['教师','教育'], '咨询类': ['咨询'], '金融类': ['金融','财务'] };
                for (var t in typeMap) {
                    if (typeMap[t].some(function(kw){ return jobName.indexOf(kw) !== -1 || (job.jobType === t); })) {
                        score += 20;
                        if (reasons.indexOf('职位类型匹配') === -1) reasons.push('职位类型匹配');
                        break;
                    }
                }
            } else if (record.systemType === 'stress' && r.level) {
                if (r.level === '高') { score += 25; reasons.push('抗压能力较强，适合挑战性岗位'); }
                else if (r.level === '中等') { score += 15; reasons.push('抗压能力中等，适合多数岗位'); }
            } else if (record.systemType === 'intelligence' && r.level) {
                if (r.level === '优秀' || r.level === '良好') { score += 25; reasons.push('认知能力较好，适合技术/分析类岗位'); }
                var jobName = (job.name || '').toLowerCase();
                if (jobName.indexOf('工程师') !== -1 || jobName.indexOf('开发') !== -1 || jobName.indexOf('分析') !== -1) { score += 20; reasons.push('岗位与智力测评维度匹配'); }
            } else if (record.systemType === 'ability' && r.level) {
                if (r.level === '高') { score += 25; reasons.push('职业能力较强，适合综合要求较高的岗位'); }
                else if (r.level === '中等') { score += 15; reasons.push('职业能力中等，适合多数岗位'); }
                var jobName = (job.name || '').toLowerCase();
                if (r.dimensions && r.dimensions.leadership && r.dimensions.leadership.score >= 4 && (jobName.indexOf('管理') !== -1 || jobName.indexOf('主管') !== -1 || jobName.indexOf('经理') !== -1)) { score += 20; reasons.push('领导力与岗位匹配'); }
            } else if (record.systemType === 'interest' && r.dominant) {
                var jobName = (job.name || '').toLowerCase();
                var jobType = (job.jobType || '') + (job.industry || '');
                var hollandJobs = (window.INTEREST_TYPES && window.INTEREST_TYPES[r.dominant] && window.INTEREST_TYPES[r.dominant].jobs) ? window.INTEREST_TYPES[r.dominant].jobs : [];
                hollandJobs.forEach(function(recJob) {
                    if (jobName.indexOf(recJob.toLowerCase()) !== -1 || jobType.indexOf(recJob) !== -1) { score += 35; reasons.push('与兴趣测评推荐职业一致'); }
                });
                if (score === 0) { score += 20; reasons.push('可根据兴趣类型探索更多岗位'); }
            }
            if (score === 0) score = 50;
            return { score: Math.min(100, score), reasons: reasons };
        }

        function loadAndRenderReportJobs(record) {
            var container = document.getElementById('report-job-recommendations');
            if (!container) return;
            container.innerHTML = '<div class="text-gray-500 py-4"><i class="fa fa-spinner fa-spin mr-2"></i>正在加载适合岗位…</div>';
            var base = getApiBase();
            fetch(base + '/jobs', { method: 'GET', headers: { 'Content-Type': 'application/json' } })
                .then(function(res) { return res.json(); })
                .then(function(json) {
                    var list = (json && json.success && Array.isArray(json.data)) ? json.data : [];
                    if (list.length === 0) {
                        container.innerHTML = '<p class="text-gray-500">暂无在招岗位，请稍后到<a href="recommendation.html" class="text-primary underline">岗位推荐</a>查看。</p>';
                        return;
                    }
                    var scored = list.map(function(job) {
                        var o = scoreJobByAssessment(job, record);
                        return { job: job, matchScore: o.score, matchReasons: o.reasons };
                    });
                    scored.sort(function(a, b) { return b.matchScore - a.matchScore; });
                    var top = scored.slice(0, 8);
                    container.innerHTML = top.map(function(item) {
                        var j = item.job;
                        var name = j.name || j.title || '岗位';
                        var company = j.companyName || j.company_name || '企业';
                        var salary = j.salary || j.salaryRange || '面议';
                        var location = j.location || '';
                        var id = j.id;
                        var reasons = (item.matchReasons && item.matchReasons.length) ? item.matchReasons.map(function(r){ return '<span class="text-xs text-green-600">' + r + '</span>'; }).join('、') : '';
                        return '<div class="bg-gray-50 rounded-lg p-4 border border-gray-100">' +
                            '<div class="flex justify-between items-start"><div><h3 class="font-medium text-gray-800">' + name + '</h3>' +
                            '<p class="text-sm text-gray-500 mt-1">' + company + (location ? ' · ' + location : '') + ' · ' + salary + '</p>' +
                            (reasons ? '<p class="text-xs mt-2">' + reasons + '</p>' : '') + '</div>' +
