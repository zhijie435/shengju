<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政企登录 - 圣举人才网</title>
    <link rel="stylesheet" href="/static/css/tailwind-local.css">
  <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="../js/api-config.js"></script>
    <script src="../js/auth-helper.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#4F46E5' } } } };
    </script>
</head>
<body class="font-sans bg-gray-50 min-h-screen flex flex-col">
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="../index.html" class="flex items-center space-x-2">
                <span class="text-xl font-bold text-primary">圣举人才网</span>
            </a>
            <a href="../index.html" class="text-sm text-gray-600 hover:text-primary">返回首页</a>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="bg-white rounded-xl shadow-lg max-w-md w-full p-8">
            <h1 class="text-2xl font-bold text-primary mb-2">政企登录</h1>
            <p class="text-gray-600 text-sm mb-6">登录后使用人才池、测评管理与政企中心</p>
            <p class="text-gray-500 text-xs mb-4">同一手机号可同时注册求职者与企业账号，两端密码互不影响；请使用企业注册时的密码登录本页。</p>
            <div class="flex border-b border-gray-200 mb-4" role="tablist">
                <button type="button" id="loginTabPwd" class="flex-1 py-2 text-sm font-medium text-primary border-b-2 border-primary">密码登录</button>
                <button type="button" id="loginTabSms" class="flex-1 py-2 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-primary">短信登录</button>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">邮箱/手机号</label>
                    <input type="text" id="loginIdentifier" required placeholder="请输入邮箱或手机号"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required placeholder="请输入密码"
                            class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <button type="button" id="toggleLoginPassword" aria-label="显示/隐藏密码"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                            <i class="fa fa-eye" id="loginPasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <div id="loginError" class="hidden text-sm text-red-600"></div>
                <button type="submit" id="loginBtn" class="w-full bg-primary hover:bg-indigo-700 text-white font-medium py-3 rounded-lg transition">
                    登录
                </button>
            </form>
            <div id="loginFormSms" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                    <input type="tel" id="smsPhone" maxlength="11" inputmode="numeric" placeholder="注册时填写的手机号"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">短信验证码</label>
                    <div class="flex gap-2">
                        <input type="text" id="smsCode" maxlength="6" inputmode="numeric" autocomplete="one-time-code" placeholder="验证码"
                            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <button type="button" id="smsSendBtn" class="px-3 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm whitespace-nowrap">获取验证码</button>
                    </div>
                </div>
                <div id="loginSmsError" class="hidden text-sm text-red-600"></div>
                <button type="button" id="smsLoginBtn" class="w-full bg-primary hover:bg-indigo-700 text-white font-medium py-3 rounded-lg transition">登录</button>
            </div>
            <p class="text-center text-sm text-gray-600 mt-6">
                还没有账号？<a href="../index.html?action=register&userType=enterprise" class="text-primary hover:underline">立即注册</a>
            </p>
            <div class="mt-8 pt-6 border-t border-gray-200">
                <p class="text-sm font-medium text-gray-700 mb-3">子审核账号登录</p>
                <p class="text-xs text-gray-500 mb-3">由企业主账号在「审核管理」中创建，仅可审核报名，无企业中心权限。</p>
                <form id="reviewerLoginForm" class="space-y-3">
                    <input type="text" id="reviewerLoginUsername" required placeholder="子账号用户名"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    <input type="password" id="reviewerLoginPassword" required placeholder="密码"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    <div id="reviewerLoginError" class="hidden text-sm text-red-600"></div>
                    <button type="submit" id="reviewerLoginBtn" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 rounded-lg transition">子审核登录</button>
                </form>
            </div>
        </div>
    </main>
    <script>
        (function() {
            // 密码可见切换
            document.getElementById('toggleLoginPassword').addEventListener('click', function() {
                var input = document.getElementById('loginPassword');
                var icon = document.getElementById('loginPasswordIcon');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
            const API_BASE_URL = (typeof window !== 'undefined' && window.API_BASE_URL) ? window.API_BASE_URL : (function () {
                try { var a = localStorage.getItem('apiBaseUrl'); if (a) return a; } catch (e) {}
                return (window.location.origin && (window.location.origin.indexOf('http') === 0) ? window.location.origin + '/api/v1' : 'http://127.0.0.1:3001/api/v1');
            })();
            /** 与 exam-sso 一致：登后续跳转笔试时携带 token；仅同域相对路径或本站绝对路径 */
            function getReturnToTarget() {
                try {
                    var q = new URLSearchParams(window.location.search);
                    var raw = q.get('return_to') || q.get('return') || q.get('redirect') || '';
                    if (!raw) return null;
                    if (raw.indexOf('%') >= 0) try { raw = decodeURIComponent(raw); } catch (e1) { /* 保持 */ }
                    if (raw.indexOf('javascript:') === 0) return null;
                    if (raw.indexOf('http://') === 0 || raw.indexOf('https://') === 0) {
                        var u = new URL(raw);
                        if (u.origin !== window.location.origin) return null;
                        return u.pathname + (u.search || '') + (u.hash || '');
                    }
                    if (raw.indexOf('/') === 0) return raw;
                } catch (e2) { return null; }
                return null;
            }
            function goAfterEnterpriseLogin(token) {
                var ret = getReturnToTarget();
                if (ret) {
                    if (ret.indexOf('exam-admin') >= 0) {
                        var sep = ret.indexOf('?') >= 0 ? '&' : '?';
                        window.location.href = ret + sep + 'token=' + encodeURIComponent(token);
                        return;
                    }
                    window.location.href = ret;
                    return;
                }
                window.location.href = 'company-center.html';
            }
            const TEST_ACCOUNTS = [
                { identifier: 'enterprise@test.com', password: '123456', username: '测试企业' },
                { identifier: '13900139000', password: '123456', username: '企业2' },
                { identifier: 'company@example.com', password: '123456', username: '测试企业' }
            ];
            function findTestAccount(identifier, password) {
                return TEST_ACCOUNTS.find(function(acc) {
                    return (acc.identifier && acc.identifier.toLowerCase() === identifier.toLowerCase() || acc.username === identifier) && acc.password === password;
                }) || null;
            }
            function showError(msg) {
                var el = document.getElementById('loginError');
                if (el) { el.textContent = msg || ''; el.classList.toggle('hidden', !msg); }
            }
            try {
                var q = new URLSearchParams(window.location.search);
                if (q.get('reason') === 'wrong_portal') {
                    showError('当前为求职者登录会话，企业端请使用本页「政企登录」重新登录');
                }
            } catch (e1) {}
            async function doLogin(identifier, password) {
                try {
                    var res = await fetch(API_BASE_URL + '/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identifier: identifier, password: password, userType: 'enterprise' })
                    });
                    var data = await res.json().catch(function() { return {}; });
                    if (res.ok && data.success) {
                        var tok = data.token || (data.data && (data.data.accessToken || data.data.token));
                        if (!tok) {
                            if (data.message) throw new Error(data.message);
                            throw new Error('登录失败');
                        }
                        var du = data.user || {};
                        var dd = data.data || {};
                        return {
                            success: true,
                            token: tok,
                            userId: du.id != null ? du.id : dd.userId,
                            username: du.username || dd.username,
                            userType: 'enterprise',
                            email: du.email || dd.email || ''
                        };
                    }
                    if (data.message) throw new Error(data.message);
                    throw new Error('登录失败');
                } catch (e) {
                    if (e.message && !e.message.includes('fetch') && !e.message.includes('Network')) throw e;
                    var acc = findTestAccount(identifier, password);
                    if (acc) {
                        return {
                            success: true,
                            token: 'mock_token_' + Date.now(),
                            userId: 'mock_' + Date.now(),
                            username: acc.username,
                            userType: 'enterprise',
                            email: acc.identifier
                        };
                    }
                    throw new Error('账号或密码错误，或后端服务未启动');
                }
            }
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                var id = document.getElementById('loginIdentifier').value.trim();
                var pwd = document.getElementById('loginPassword').value;
                showError('');
                var btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.textContent = '登录中...';
                try {
                    var result = await doLogin(id, pwd);
                    if (result && result.success) {
                        try { localStorage.removeItem('enterpriseLoginKind'); } catch (e0) {}
                        if (typeof AuthHelper !== 'undefined') {
                            AuthHelper.set('enterprise', {
                                token: result.token,
                                userId: result.userId || '',
                                username: result.username,
                                userType: 'enterprise',
                                email: result.email || '',
                                currentCompanyId: result.userId || '',
                                enterpriseId: result.userId || ''
                            });
                        } else {
                            localStorage.setItem('authToken', result.token);
                            localStorage.setItem('userId', result.userId || '');
                            localStorage.setItem('username', result.username);
                            localStorage.setItem('userType', 'enterprise');
                            localStorage.setItem('enterpriseId', result.userId || '');
                        }
                        goAfterEnterpriseLogin(result.token);
                        return;
                    }
                    showError(result.message || '登录失败');
                } catch (err) {
                    showError(err.message || '登录失败，请稍后重试');
                }
                btn.disabled = false;
                btn.textContent = '登录';
            });
            if (typeof AuthHelper !== 'undefined' && AuthHelper.get('enterprise') && AuthHelper.get('enterprise').token) {
                goAfterEnterpriseLogin(AuthHelper.get('enterprise').token);
            }

            function showSmsError(msg) {
                var el = document.getElementById('loginSmsError');
                if (el) { el.textContent = msg || ''; el.classList.toggle('hidden', !msg); }
            }
            function switchLoginMode(isSms) {
                var f = document.getElementById('loginForm');
                var s = document.getElementById('loginFormSms');
                var t1 = document.getElementById('loginTabPwd');
                var t2 = document.getElementById('loginTabSms');
                if (isSms) {
                    f.classList.add('hidden');
                    s.classList.remove('hidden');
                    t2.classList.add('text-primary', 'border-primary');
                    t2.classList.remove('text-gray-500', 'border-transparent');
                    t1.classList.remove('text-primary', 'border-primary');
                    t1.classList.add('text-gray-500', 'border-transparent');
                } else {
                    s.classList.add('hidden');
                    f.classList.remove('hidden');
                    t1.classList.add('text-primary', 'border-primary');
                    t1.classList.remove('text-gray-500', 'border-transparent');
                    t2.classList.remove('text-primary', 'border-primary');
                    t2.classList.add('text-gray-500', 'border-transparent');
                }
                showSmsError('');
            }
            document.getElementById('loginTabPwd').addEventListener('click', function () { switchLoginMode(false); });
            document.getElementById('loginTabSms').addEventListener('click', function () { switchLoginMode(true); });

            var entSmsTimer = null;
            document.getElementById('smsSendBtn').addEventListener('click', async function () {
                var phone = (document.getElementById('smsPhone').value || '').replace(/\D/g, '');
                var btn = document.getElementById('smsSendBtn');
                if (phone.length < 11) {
                    showSmsError('请输入正确手机号');
                    return;
                }
                showSmsError('');
                btn.disabled = true;
                btn.textContent = '发送中...';
                try {
                    var res = await fetch(API_BASE_URL + '/auth/send-sms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phone })
                    });
                    var data = await res.json().catch(function () { return {}; });
                    if (!res.ok || !data.success) {
                        showSmsError((data && data.message) ? data.message : '发送失败');
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                        return;
                    }
                    var sec = 60;
                    if (entSmsTimer) clearInterval(entSmsTimer);
                    entSmsTimer = setInterval(function () {
                        sec--;
                        btn.textContent = sec + '秒后重试';
                        if (sec <= 0) {
                            clearInterval(entSmsTimer);
                            entSmsTimer = null;
                            btn.disabled = false;
                            btn.textContent = '获取验证码';
                        }
                    }, 1000);
                } catch (e) {
                    showSmsError(e.message || '网络错误');
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            });

            document.getElementById('smsLoginBtn').addEventListener('click', async function () {
                var phone = (document.getElementById('smsPhone').value || '').replace(/\D/g, '');
                var code = (document.getElementById('smsCode').value || '').trim();
                showSmsError('');
                if (phone.length < 11 || !code) {
                    showSmsError('请填写手机号和验证码');
                    return;
                }
                var btn = document.getElementById('smsLoginBtn');
                btn.disabled = true;
                btn.textContent = '登录中...';
                try {
                    var res = await fetch(API_BASE_URL + '/auth/login-by-phone', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phone, code: code, userType: 'enterprise' })
                    });
                    var data = await res.json().catch(function () { return {}; });
                    if (data.needFaceVerify && data.tempToken) {
                        showSmsError('该企业账号当前需人脸核验流程，请使用密码登录或联系管理员。');
                        btn.disabled = false;
                        btn.textContent = '登录';
                        return;
                    }
                    if (!res.ok || !data.success) {
                        showSmsError((data && data.message) ? data.message : '登录失败');
                        btn.disabled = false;
                        btn.textContent = '登录';
                        return;
                    }
                    var tok = data.token || (data.data && (data.data.accessToken || data.data.token));
                    var du = data.user || {};
                    if (!tok) {
                        showSmsError('登录失败');
                        btn.disabled = false;
                        btn.textContent = '登录';
                        return;
                    }
                    var uid = du.id != null ? du.id : '';
                    try { localStorage.removeItem('enterpriseLoginKind'); } catch (e0) {}
                    if (typeof AuthHelper !== 'undefined') {
                        AuthHelper.set('enterprise', {
                            token: tok,
                            userId: uid,
                            username: du.username || '',
                            userType: 'enterprise',
                            email: du.email || '',
                            currentCompanyId: uid,
                            enterpriseId: uid
                        });
                    } else {
                        localStorage.setItem('authToken', tok);
                        localStorage.setItem('userId', uid);
                        localStorage.setItem('username', du.username || '');
                        localStorage.setItem('userType', 'enterprise');
                        localStorage.setItem('enterpriseId', uid);
                    }
                    goAfterEnterpriseLogin(tok);
                } catch (e) {
                    showSmsError(e.message || '登录失败');
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            });

            document.getElementById('reviewerLoginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                var u = document.getElementById('reviewerLoginUsername').value.trim();
                var p = document.getElementById('reviewerLoginPassword').value;
                var err = document.getElementById('reviewerLoginError');
                var btn = document.getElementById('reviewerLoginBtn');
                err.classList.add('hidden');
                err.textContent = '';
                btn.disabled = true;
                btn.textContent = '登录中...';
                try {
                    var res = await fetch(API_BASE_URL + '/auth/login-enterprise-reviewer', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: u, password: p })
                    });
                    var data = await res.json().catch(function() { return {}; });
                    if (!res.ok || !data.success) {
                        err.textContent = (data && data.message) || '登录失败';
                        err.classList.remove('hidden');
                        return;
                    }
                    var tok = data.token;
                    if (!tok) { err.textContent = '登录失败'; err.classList.remove('hidden'); return; }
                    try { localStorage.setItem('enterpriseLoginKind', 'reviewer'); } catch (e1) {}
                    if (typeof AuthHelper !== 'undefined') {
                        AuthHelper.set('enterprise', {
                            token: tok,
                            userId: data.user && data.user.id,
                            username: (data.user && data.user.username) || u,
                            userType: 'enterprise',
                            enterpriseId: data.user && data.user.enterpriseId,
                            role: 'enterprise_reviewer'
                        });
                    } else {
                        localStorage.setItem('authToken_enterprise', tok);
                        localStorage.setItem('authToken', tok);
                        localStorage.setItem('enterpriseId', String((data.user && data.user.enterpriseId) || ''));
                        localStorage.setItem('username', (data.user && data.user.username) || u);
                        localStorage.setItem('userType', 'enterprise');
                    }
                    window.location.href = 'tests.html';
                } catch (ex) {
                    err.textContent = ex.message || '网络错误';
                    err.classList.remove('hidden');
                } finally {
                    btn.disabled = false;
                    btn.textContent = '子审核登录';
                }
            });
        })();
    </script>
</body>
</html>
