name: 构建 Windows 离线安装包

on:
  # 手动触发（在 GitHub 网页 Actions 标签页点击 "Run workflow"）
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.0）'
        required: true
        default: '1.0.0'
  # 推送到 main/master 时自动触发（可删除此段如不需要自动构建）
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/offline-windows/**'

# 必须在 Windows 上运行，才能获得正确的原生模块二进制
jobs:
  build:
    runs-on: windows-latest   # Windows Server 2022, x64
    timeout-minutes: 90

    steps:
      # ── 1. 拉取代码 ────────────────────────────────────────────────────────
      - name: 拉取代码
        uses: actions/checkout@v4

      # ── 2. 配置 Node.js v20 ───────────────────────────────────────────────
      - name: 配置 Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. 构建 4 个前端 ──────────────────────────────────────────────────
      - name: 安装并构建 exam-admin
        working-directory: frontend/exam-admin
        run: |
          npm install
          npm run build

      - name: 安装并构建 exam-student
        working-directory: frontend/exam-student
        run: |
          npm install
          npm run build

      - name: 安装并构建 exam-grader
        working-directory: frontend/exam-grader
        run: |
          npm install
          npm run build

      - name: 安装并构建 exam-super-admin
        working-directory: frontend/exam-super-admin
        run: |
          npm install
          npm run build

      # ── 4. 提前创建 Chromium 缓存目录，再安装后端依赖 ─────────────────────
      - name: 预创建 Chromium 缓存目录
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "deploy/offline-windows/packaging/runtime/chromium"
          Write-Host "✓ Chromium 缓存目录已创建"

      - name: 安装后端依赖（Windows 原生模块 + Puppeteer Chromium）
        working-directory: backend
        env:
          # 使用正斜杠，Node.js/Puppeteer 在 Windows 下均可识别
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/deploy/offline-windows/packaging/runtime/chromium
          PUPPETEER_SKIP_DOWNLOAD: 'false'
        run: |
          npm ci --omit=dev

      # ── 5. 准备 packaging/app 目录 ────────────────────────────────────────
      - name: 准备打包目录结构
        shell: pwsh
        run: |
          $pkg = "deploy\offline-windows\packaging"
          New-Item -ItemType Directory -Force -Path "$pkg\app\backend"
          New-Item -ItemType Directory -Force -Path "$pkg\app\frontend"
          New-Item -ItemType Directory -Force -Path "$pkg\data"
          New-Item -ItemType Directory -Force -Path "$pkg\logs"
          New-Item -ItemType Directory -Force -Path "deploy\offline-windows\dist"

          # 复制后端（排除 .env、上传目录和 macOS 垃圾文件）
          Write-Host "复制后端文件..."
          Copy-Item -Path "backend\*" -Destination "$pkg\app\backend\" -Recurse -Force `
            -Exclude @('.env', 'uploads')
          # 删除 macOS AppleDouble 隐藏文件
          Get-ChildItem "$pkg\app\backend" -Recurse -Filter "._*" | Remove-Item -Force

          # 复制各前端 dist
          foreach ($app in @("exam-admin","exam-student","exam-grader","exam-super-admin")) {
            $src = "frontend\$app\dist"
            $dst = "$pkg\app\frontend\$app\dist"
            if (Test-Path $src) {
              New-Item -ItemType Directory -Force -Path $dst
              Copy-Item -Path "$src\*" -Destination $dst -Recurse -Force
              Write-Host "✓ 复制 $app dist"
            } else {
              Write-Warning "未找到 $src，前端构建可能失败"
            }
          }

      # ── 6. 下载 Node.js v20 LTS 便携版（固定版本，curl.exe 直接下载）──────
      - name: 下载 Node.js v20 LTS 便携版
        shell: pwsh
        run: |
          $pkg = "deploy\offline-windows\packaging"
          # 固定 Node.js 20 LTS 版本，确保稳定性
          $version = "v20.19.2"
          $zipName = "node-$version-win-x64.zip"
          $url = "https://nodejs.org/dist/$version/$zipName"
          Write-Host "下载 Node.js $version: $url"

          # curl.exe 原生随 Windows 10+ 内置，支持 -L 跟随重定向，比 Invoke-WebRequest 更可靠
          curl.exe -L -f --retry 3 --max-time 300 -o node-win-x64.zip $url
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Node.js 下载失败 (exit $LASTEXITCODE)"
            exit 1
          }

          Expand-Archive -Path "node-win-x64.zip" -DestinationPath "node-tmp" -Force
          $extractedDir = Get-ChildItem "node-tmp" -Directory | Select-Object -First 1
          if (-not $extractedDir) { Write-Error "解压失败，未找到子目录"; exit 1 }
          New-Item -ItemType Directory -Force -Path "$pkg\runtime\node"
          Copy-Item -Path "$($extractedDir.FullName)\*" -Destination "$pkg\runtime\node\" -Recurse -Force
          Write-Host "✓ Node.js $version 就绪"

      # ── 7. 下载 MariaDB 10.11 便携版（curl.exe + archive.mariadb.org 直链）─
      - name: 下载 MariaDB 10.11 便携版
        shell: pwsh
        run: |
          $pkg = "deploy\offline-windows\packaging"
          $version = "10.11.10"
          $zipName = "mariadb-$version-winx64.zip"

          # 优先使用 archive.mariadb.org 直链（无重定向）
          $urls = @(
            "https://archive.mariadb.org/mariadb-$version/winx64-packages/$zipName",
            "https://downloads.mariadb.org/mariadb/$version/$zipName",
            "https://mirror.mariadb.org/mariadb-$version/winx64-packages/$zipName"
          )

          $downloaded = $false
          foreach ($url in $urls) {
            Write-Host "尝试下载: $url"
            # -f 遇到 HTTP 错误直接失败（不保存 HTML 错误页），-L 跟随重定向
            curl.exe -L -f --retry 2 --max-time 600 -o mariadb.zip $url
            if ($LASTEXITCODE -eq 0) {
              # 验证是否真实 ZIP（文件头 PK\x03\x04）
              $bytes = [System.IO.File]::ReadAllBytes("mariadb.zip")[0..3]
              if ($bytes[0] -eq 0x50 -and $bytes[1] -eq 0x4B) {
                Write-Host "✓ 下载验证通过: $url"
                $downloaded = $true
                break
              } else {
                Write-Warning "下载内容不是有效 ZIP，尝试下一个镜像..."
                Remove-Item "mariadb.zip" -Force
              }
            } else {
              Write-Warning "下载失败 (exit $LASTEXITCODE)，尝试下一个镜像..."
              if (Test-Path "mariadb.zip") { Remove-Item "mariadb.zip" -Force }
            }
          }

          if (-not $downloaded) {
            Write-Error "所有镜像均失败，MariaDB 下载中止"
            exit 1
          }

          Write-Host "解压 MariaDB..."
          Expand-Archive -Path "mariadb.zip" -DestinationPath "mariadb-tmp" -Force

          $extractedDir = Get-ChildItem "mariadb-tmp" -Directory | Select-Object -First 1
          if (-not $extractedDir) { Write-Error "MariaDB 解压失败"; exit 1 }
          New-Item -ItemType Directory -Force -Path "$pkg\runtime\mariadb"
          Copy-Item -Path "$($extractedDir.FullName)\*" -Destination "$pkg\runtime\mariadb\" -Recurse -Force
          Write-Host "✓ MariaDB $version 就绪"

      # ── 8. 确认 Chromium 已下载 ───────────────────────────────────────────
      - name: 确认 Chromium 路径
        shell: pwsh
        run: |
          $pkg = "deploy\offline-windows\packaging"
          $chrome = Get-ChildItem "$pkg\runtime\chromium" -Recurse -Filter "chrome.exe" `
            -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($chrome) {
            Write-Host "✓ Chromium: $($chrome.FullName)"
            $relPath = $chrome.FullName.Replace((Resolve-Path "$pkg").Path + "\", "")
            Write-Host "Chromium 相对路径: $relPath"
          } else {
            Write-Warning "未找到 chrome.exe，Word导入/PDF功能离线下不可用"
            # 非致命，继续构建
          }

      # ── 9. 安装 Inno Setup 并打包 ─────────────────────────────────────────
      - name: 安装 Inno Setup 6
        run: choco install innosetup --yes --no-progress

      - name: 生成安装包 .exe
        shell: cmd
        env:
          APP_VERSION: ${{ github.event.inputs.version || '1.0.0' }}
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ^
            /DAppVersion=%APP_VERSION% ^
            "deploy\offline-windows\build\package.iss"

      # ── 10. 上传安装包为 Artifact ─────────────────────────────────────────
      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: 圣举考试系统_安装包_v${{ github.event.inputs.version || '1.0.0' }}
          path: deploy/offline-windows/dist/*.exe
          # 保留 30 天
          retention-days: 30
          if-no-files-found: error

      # ── 可选：发布到 GitHub Release ──────────────────────────────────────
      # - name: 创建 GitHub Release
      #   if: github.event_name == 'workflow_dispatch'
      #   uses: softprops/action-gh-release@v1
      #   with:
      #     tag_name: v${{ github.event.inputs.version }}
      #     name: 圣举考试系统 v${{ github.event.inputs.version }}
      #     files: deploy/offline-windows/dist/*.exe
